x-demo-logging: &demo-logging
  driver: json-file
  options:
    max-size: ${DEMO_LOG_MAX_SIZE:-10m}
    max-file: ${DEMO_LOG_MAX_FILE:-3}

services:
  postgres:
    mem_limit: ${DEMO_POSTGRES_MEM_LIMIT:-384m}
    logging: *demo-logging

  redis:
    mem_limit: ${DEMO_REDIS_MEM_LIMIT:-128m}
    logging: *demo-logging

  zookeeper:
    mem_limit: ${DEMO_ZOOKEEPER_MEM_LIMIT:-384m}
    environment:
      KAFKA_HEAP_OPTS: ${DEMO_ZOOKEEPER_HEAP_OPTS:--Xms128m -Xmx256m}
    logging: *demo-logging

  kafka:
    mem_limit: ${DEMO_KAFKA_MEM_LIMIT:-768m}
    environment:
      KAFKA_HEAP_OPTS: ${DEMO_KAFKA_HEAP_OPTS:--Xms256m -Xmx512m}
      KAFKA_LOG_RETENTION_HOURS: ${KAFKA_LOG_RETENTION_HOURS:-72}
      KAFKA_LOG_RETENTION_BYTES: ${KAFKA_LOG_RETENTION_BYTES:-1073741824}
      KAFKA_LOG_SEGMENT_BYTES: ${KAFKA_LOG_SEGMENT_BYTES:-268435456}
    logging: *demo-logging

  kafka-init:
    logging: *demo-logging

  db-init:
    image: postgres:16
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-threerevertwatch}
      POSTGRES_USER: ${POSTGRES_USER:-threerevertwatch}
      PGPASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
    volumes:
      - ./db/migrations/001_conflict_monitoring.sql:/schema.sql:ro
    entrypoint: ["bash", "-lc"]
    command:
      - |
        set -euo pipefail
        psql \
          --host=postgres \
          --username="$${POSTGRES_USER}" \
          --dbname="$${POSTGRES_DB}" \
          --set=ON_ERROR_STOP=1 \
          --file=/schema.sql
    restart: "no"
    logging: *demo-logging

  collector:
    mem_limit: ${DEMO_DOTNET_WORKER_MEM_LIMIT:-256m}
    logging: *demo-logging

  topicmatcher:
    mem_limit: ${DEMO_DOTNET_WORKER_MEM_LIMIT:-256m}
    depends_on:
      kafka-init:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      db-init:
        condition: service_completed_successfully
    logging: *demo-logging

  conflictdetector:
    mem_limit: ${DEMO_DOTNET_WORKER_MEM_LIMIT:-256m}
    depends_on:
      kafka-init:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      db-init:
        condition: service_completed_successfully
    environment:
      Database__MigrateOnStartup: "false"
    logging: *demo-logging

  aggregator:
    mem_limit: ${DEMO_DOTNET_WORKER_MEM_LIMIT:-256m}
    depends_on:
      kafka-init:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      db-init:
        condition: service_completed_successfully
    environment:
      Database__MigrateOnStartup: "false"
    logging: *demo-logging

  reverse-proxy:
    image: caddy:2.8-alpine
    mem_limit: ${DEMO_REVERSE_PROXY_MEM_LIMIT:-128m}
    depends_on:
      frontend:
        condition: service_healthy
      gateway:
        condition: service_healthy
    environment:
      PUBLIC_HOST: ${PUBLIC_HOST:?Set PUBLIC_HOST in .env, for example demo.example.com}
      PUBLIC_FALLBACK_HOST: ${PUBLIC_FALLBACK_HOST:-localhost}
    ports:
      - "${PUBLIC_HTTP_PORT:-80}:80"
      - "${PUBLIC_HTTPS_PORT:-443}:443"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    restart: unless-stopped
    logging: *demo-logging

  gateway:
    mem_limit: ${DEMO_DOTNET_WEB_MEM_LIMIT:-384m}
    environment:
      ServiceUrls__GatewayPublicUrl: https://${PUBLIC_HOST:?Set PUBLIC_HOST in .env}
      Cors__AllowedOrigins__0: https://${PUBLIC_HOST:?Set PUBLIC_HOST in .env}
      Cors__AllowedOrigins__1: http://${PUBLIC_HOST:?Set PUBLIC_HOST in .env}
      Cors__AllowedOrigins__2: https://${PUBLIC_FALLBACK_HOST:-localhost}
      Cors__AllowedOrigins__3: http://${PUBLIC_FALLBACK_HOST:-localhost}
    logging: *demo-logging

  frontend:
    mem_limit: ${DEMO_DOTNET_WEB_MEM_LIMIT:-384m}
    logging: *demo-logging

  postgres-retention:
    image: postgres:16
    mem_limit: ${DEMO_RETENTION_MEM_LIMIT:-128m}
    depends_on:
      postgres:
        condition: service_healthy
      db-init:
        condition: service_completed_successfully
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-threerevertwatch}
      POSTGRES_USER: ${POSTGRES_USER:-threerevertwatch}
      PGPASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      DEMO_EDIT_RETENTION_DAYS: ${DEMO_EDIT_RETENTION_DAYS:-3}
      DEMO_SNAPSHOT_RETENTION_DAYS: ${DEMO_SNAPSHOT_RETENTION_DAYS:-7}
      DEMO_CANDIDATE_RETENTION_DAYS: ${DEMO_CANDIDATE_RETENTION_DAYS:-7}
      DEMO_CLEANUP_INTERVAL_SECONDS: ${DEMO_CLEANUP_INTERVAL_SECONDS:-86400}
    volumes:
      - ./scripts/demo-retention.sql:/demo-retention.sql:ro
    entrypoint: ["bash", "-lc"]
    command:
      - |
        set -euo pipefail
        while true; do
          echo "Running demo retention cleanup at $$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          psql \
            --host=postgres \
            --username="$${POSTGRES_USER}" \
            --dbname="$${POSTGRES_DB}" \
            --set=ON_ERROR_STOP=1 \
            --set=edit_retention_days="$${DEMO_EDIT_RETENTION_DAYS}" \
            --set=snapshot_retention_days="$${DEMO_SNAPSHOT_RETENTION_DAYS}" \
            --set=candidate_retention_days="$${DEMO_CANDIDATE_RETENTION_DAYS}" \
            --file=/demo-retention.sql
          sleep "$${DEMO_CLEANUP_INTERVAL_SECONDS}"
        done
    restart: unless-stopped
    logging: *demo-logging

volumes:
  caddy-data:
  caddy-config:
