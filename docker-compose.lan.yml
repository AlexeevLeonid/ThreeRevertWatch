services:
  reverse-proxy:
    build:
      context: .
      dockerfile: Dockerfile.proxy
    depends_on:
      frontend:
        condition: service_healthy
      gateway:
        condition: service_healthy
    ports:
      - "${LAN_PORT:-8080}:80"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/health >/dev/null"]
      interval: 20s
      timeout: 5s
      retries: 10
    restart: unless-stopped
