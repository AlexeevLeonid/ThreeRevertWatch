name: CI

on:
  push:
    branches:
      - master
      - main
  pull_request:
    branches:
      - master
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-test:
    name: Build and test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Restore
        run: dotnet restore ThreeRevertWatch.slnx

      - name: Build
        run: dotnet build ThreeRevertWatch.slnx --configuration Release --no-restore

      - name: Test
        run: dotnet test ThreeRevertWatch.slnx --configuration Release --no-build --verbosity normal

  compose-config:
    name: Validate demo compose
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate compose
        env:
          PUBLIC_HOST: demo.example.com
          POSTGRES_PASSWORD: dummy-password
        run: docker compose -f docker-compose.yml -f docker-compose.demo.yml config --quiet
